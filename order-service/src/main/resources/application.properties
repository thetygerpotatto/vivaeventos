# ===== Aplicación =====
spring.application.name=order-service
server.port=8081

# ===== Base de datos H2 (desarrollo local) =====
spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ===== Consola H2 =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
info.app.name=order-service
info.app.version=1.0.0-MVP
info.app.description=Microservicio de ordenes - VivaEventos


spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.jpa.open-in-view=false